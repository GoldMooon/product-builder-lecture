<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추천기</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <lotto-generator>
    <main class="card">
      <h1>로또 번호 추천기</h1>
      <p class="subtitle">
        원하는 만큼 추천 세트를 선택하고, 보너스 번호 포함 여부도 옵션으로 정할 수 있습니다.
      </p>

      <section class="controls" aria-label="추천 옵션">
        <div class="control-group">
          <label for="setCount">추천 세트 수</label>
          <select id="setCount">
            <option value="1">1개</option>
            <option value="2">2개</option>
            <option value="3">3개</option>
            <option value="4">4개</option>
            <option value="5" selected>5개</option>
          </select>
        </div>

        <div class="control-group">
          <label for="includeBonus">보너스 번호</label>
          <div class="checkbox-row">
            <input type="checkbox" id="includeBonus" />
            <span>보너스 번호 포함</span>
          </div>
        </div>
      </section>

      <div class="button-wrap">
        <button id="pickBtn">번호 추천받기</button>
      </div>

      <section id="resultGrid" class="result-grid" aria-label="추천 번호 결과"></section>

      <section class="info">
        <strong>안내</strong><br />
        각 세트는 1부터 45까지 중복 없이 6개 번호를 뽑습니다. 보너스 번호를 선택하면 본 번호와 겹치지 않는 번호 1개가 추가됩니다.
      </section>

      <section class="history">
        <div class="history-header">
          <h2>최근 추천 기록</h2>
          <button id="clearBtn" class="clear-btn">기록 삭제</button>
        </div>
        <ul id="historyList" class="history-list">
          <li class="empty-text">아직 추천 기록이 없습니다.</li>
        </ul>
      </section>

      <hr class="divider" />

      <section class="ai-test">
        <h2>AI 남녀 구분 테스트</h2>
        <p class="subtitle">카메라를 통해 성별을 예측해 보세요. (AI 모델 사용)</p>
        <gender-classifier></gender-classifier>
      </section>

      <hr class="divider" />

      <section class="contact">
        <h2>제휴 문의</h2>
        <p class="contact-desc">제휴 제안이나 궁금한 점이 있다면 아래 폼을 통해 문의해 주세요.</p>
        <form action="https://formspree.io/f/mjgpjlwz" method="POST" class="contact-form">
          <div class="form-group">
            <label for="name">성함</label>
            <input type="text" id="name" name="name" placeholder="성함을 입력해 주세요" required />
          </div>
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="_replyto" placeholder="답변받을 이메일 주소" required />
          </div>
          <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="4" placeholder="문의 내용을 상세히 적어 주세요" required></textarea>
          </div>
          <div class="button-wrap">
            <button type="submit">문의 보내기</button>
          </div>
        </form>
      </section>

      <hr class="divider" />

      <section class="comments">
        <h2>사용자 댓글</h2>
        <div id="disqus_thread"></div>
        <script>
            /**
            *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
            *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
            /*
            var disqus_config = function () {
            this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
            this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
            };
            */
            (function() { // DON'T EDIT BELOW THIS LINE
            var d = document, s = d.createElement('script');
            s.src = 'https://week-17.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
            })();
        </script>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
      </section>
    </main>
  </lotto-generator>

  <script src="main.js"></script>
</body>
</html>
